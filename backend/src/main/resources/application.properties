spring.application.name=smart-campus-backend
server.port=8080
spring.config.import=optional:file:./.env.properties,optional:file:./backend/.env.properties,optional:file:./.env,optional:file:./backend/.env
spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.auto-index-creation=true
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false

app.frontend.base-url=${FRONTEND_BASE_URL:http://localhost:5173}
app.security.admin-emails=${ADMIN_EMAILS:}

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
